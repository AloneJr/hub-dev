<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Pixelado - Jeryel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="topo">
        <h1 class="logo"> 
            <img src="assets/pieces/w_queen.png" alt="Logo"> 
            <span>Xadrez v.02</span>
        </h1>

        <div class="acoes">
            <button class="btn btn-icon" id="btn-reset">
                <img src="assets/buttons/retry_b.png" alt="Reiniciar">
            </button>
            <button class="btn btn-icon" id="btn-tema">
                <img id="tema-icone" src="assets/buttons/moon.png" alt="Tema">
            </button>
        </div>
    </header>

    <main class="layout">        
        <section class="painel">
            <h2>Status</h2>
            <p><strong>Turno:</strong> <span id="turno">Brancas</span></p>
            <p><strong>Estado:</strong> <span id="estado-jogo">Jogando</span></p>
            <p class="dica">Arraste as peças para jogar.</p>
        </section>

        <section class="game-area">
            <div class="board" id="board"></div>
        </section>

        <section></section> 
    </main>

    <footer class="rodape">
        <small>Feito por Jeryel A Silva • HTML/CSS/JS</small>        
    </footer>

    <div id="cursor-user" class="cursor idle"></div>

    <img src="assets/bg/e_tree.png" class="e-tree hidden" id="tree-egg" alt="Terraria Tree">
    <div class="e-tree-tooltip hidden" id="tree-tooltip">Easter Egg encontrado!</div>
    
    <audio id="sfx-egg" src="assets/sfx/toasty_egg.mp3"></audio>

    <script src="scripts.js"></script>
</body>
</html>
